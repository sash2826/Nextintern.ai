# ============================================================
# NextIntern.ai — Continuous Integration
# Runs build + test for all services on push/PR to main
# ============================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Spring Boot API ────────────────────────────────────────
  api-build:
    name: "API — Build & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    env:
      # Use the 'test' profile (H2 in-memory DB, no external services)
      SPRING_PROFILES_ACTIVE: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Build + unit tests only; skip integration tests that need infra
      - name: Build & Test
        run: >-
          mvn -B verify
          -Dgroups='!integration'
          -Dtest='!RateLimitTest'

      # Upload test reports for debugging failures
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-test-reports
          path: api/target/surefire-reports/
          retention-days: 7

  # ── Next.js Frontend ───────────────────────────────────────
  web-build:
    name: "Web — Lint & Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint > web_lint.log 2>&1 || true

      - name: Build
        run: npm run build > web_build.log 2>&1 || true

      - name: Upload Logs
        if: always()
        run: |
          cat web_lint.log web_build.log > all_logs.txt || true

      - name: Upload Debug Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-ci-logs
          path: web/all_logs.txt
          retention-days: 1

  # ── FastAPI Recommender ────────────────────────────────────
  recs-build:
    name: "Recs — Lint & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recs

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: recs/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on complexity and style (non-blocking)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run tests
        run: pytest --tb=short -q

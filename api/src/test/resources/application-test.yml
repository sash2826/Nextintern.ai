spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  cloud:
    aws:
      sqs:
        endpoint: http://localhost:4566
      credentials:
        access-key: test
        secret-key: test
      region:
        static: us-east-1

app:
  jwt:
    private-key-path: classpath:keys/private.pem
    public-key-path: classpath:keys/public.pem
    access-token-ttl: 900
    refresh-token-ttl: 604800
  cors:
    allowed-origins: http://localhost:3000
  google:
    client-id: test-google-client-id
  rate-limit:
    enabled: false
  recs:
    service-url: http://localhost:8000
    hmac-secret: test-hmac-secret
    timeout-ms: 5000
  events:
    queues:
      internship-events: internship-events
      internship-events-dlq: internship-events-dlq
      application-events: application-events
